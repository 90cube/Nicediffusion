[app]
title = "Nicediff v1.0"
theme = "dark"
port = 8080

[paths]
checkpoints = "models/checkpoints"
vae = "models/vae"
loras = "models/loras"
embeddings = "models/embeddings"
outputs = "outputs"

[generation]
default_steps = 20
default_cfg = 7.0
default_sampler = "DPM++ 2M"
default_scheduler = "Karras"

[ui]
history_limit = 50
thumbnail_size = 128